# K-CHOPORE · anac017 DRS — primary conda environment
# Pinned to the versions installed in the working `kchopore` env on the analysis
# server (usuario2@156.35.42.17), captured 2026-06-25. Full raw capture, including
# exact build strings, is in envs/frozen/kchopore.txt.
#
# This is the PRIMARY pipeline env (Snakemake, mapping, QC, isoforms, DESeq2/GO).
# The three specialised tools run in their own isolated envs because they pin older
# Python / numpy / torch and would otherwise conflict:
#   - m6anet  -> envs/frozen/m6anet.txt   (python 3.8, torch 1.6.0)
#   - xpore   -> envs/frozen/xpore.txt    (python 3.8)
#   - pycoQC  -> envs/frozen/pycoqc_env.txt (plotly 4.1.0, kept apart; see note below)
# Figure generation (ELIGOS2 m6A downstream) runs in `viz` -> envs/frozen/viz.txt.
#
# plotly / NanoPlot: there is NO real conflict in this env. NanoPlot 1.46.1 and
# plotly 6.3.1 coexist here, and pycoQC 2.5.2 also runs against plotly 6.3.1 (it is
# version-tolerant at runtime). The legacy plotly==4.1.0 pin only exists in the
# separate pycoqc_env as a fallback, never sharing a process with NanoPlot.

name: kchopore
channels:
  - conda-forge
  - bioconda
  - nodefaults

dependencies:
  - python=3.11.14
  # --- workflow engine ---
  - snakemake-minimal=9.13.4
  - pulp=2.8.0
  # --- alignment / BAM ---
  - minimap2=2.30
  - samtools=1.22.1
  - htslib=1.22.1
  - bedtools=2.31.1
  - mappy=2.24
  - pysam=0.23.3
  - pybedtools=0.12.0
  - ncls=0.0.70
  # --- isoforms / quant ---
  - stringtie=3.0.3
  - salmon=1.10.3
  - flair-brookslab=2.0.0
  - gffcompare=0.12.10
  - seqkit=2.10.1
  - filtlong=0.3.1
  - mosdepth=0.3.11
  # --- ONT QC ---
  - nanoplot=1.46.1
  - nanocomp=1.25.6
  - nanofilt=2.8.0
  - nanoget=1.19.3
  - nanomath=1.4.0
  - fastqc=0.12.1
  - multiqc=1.32
  # --- file formats / signal ---
  - h5py=3.15.1
  - pod5=0.3.39
  # --- scientific stack ---
  - numpy=2.3.4
  - pandas=2.3.3
  - scipy=1.16.3
  - plotly=6.3.1
  - jinja2=3.1.6
  - markupsafe=3.0.3
  - tqdm=4.67.1
  - tabulate=0.9.0
  - python-dateutil=2.9.0.post0
  - pytz=2025.2
  - python-tzdata=2025.2
  - setuptools=80.9.0
  - wheel=0.45.1
  # --- R differential expression / enrichment (installed in the Docker image; see Dockerfile) ---
  # DESeq2 / tximport / apeglm / gprofiler2 are provided by the container, not this env.
  - pip
  - pip:
      # pip-only packages present in the working env (see envs/frozen/kchopore.txt)
      - pycoQC==2.5.2          # installed --no-deps; runs against plotly 6.3.1 here
      - ont-bonito==1.1.0
      - torch==2.11.0
      - retrying==1.4.2
      - vbz-h5py-plugin==1.0.1
